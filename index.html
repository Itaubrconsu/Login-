<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Itaucard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #004a8e 0%, #005aa5 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-img {
            max-width: 220px;
            height: auto;
            object-fit: contain;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: white;
            outline: none;
            font-size: 16px;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-group i {
            position: absolute;
            right: 0;
            top: 15px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .remember-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255,255,255,0.3);
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "✓";
            height: 16px; width: 16px;
            left: 2px; bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ec7000;
            font-size: 10px;
            font-weight: bold;
        }

        input:checked + .slider { background-color: #ec7000; }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-acessar {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #888;
            font-weight: bold;
            text-transform: lowercase;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-acessar:hover {
            background-color: #ffffff;
            color: #333;
        }

        .footer-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(5px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
        }

        .footer-item {
            text-align: center;
            cursor: pointer;
            flex: 1;
            color: rgba(255, 255, 255, 0.9);
        }

        .footer-item i {
            display: block;
            font-size: 20px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="https://iconape.com/wp-content/files/hv/208805/svg/208805.svg" alt="Logo" class="logo-img">
        </div>

        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="usuario" placeholder="digite o i ou use a câmera">
                <i class="fa-solid fa-camera"></i>
            </div>

            <div class="input-group">
                <input type="password" id="senha" placeholder="senha do i">
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="remember-card">
                <span>lembrar cartão</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <button type="button" onclick="validarLogin()" class="btn-acessar">acessar</button>
        </form>
    </div>

    <div class="footer-menu">
        <div class="footer-item">
            <i class="fa-solid fa-shield-halved"></i>
            iToken
        </div>
        <div class="footer-item">
            <i class="fa-solid fa-percent"></i>
            benefícios
        </div>
        <div class="footer-item">
            <i class="fa-solid fa-credit-card"></i>
            peça já o seu
        </div>
    </div>

    <script>
        function validarLogin() {
            // Defina aqui o login e a senha que quer validar
            const loginExato = "559802862599365"; 
            const senhaExata = "9166";

            // Obtém os valores digitados pelo utilizador
            const campoUsuario = document.getElementById('usuario').value;
            const campoSenha = document.getElementById('senha').value;

            // Verifica se os campos correspondem aos valores exatos
            if (campoUsuario === loginExato && campoSenha === senhaExata) {
                alert("Acesso confirmado!");
                window.location.href = "https://www.itau.com.br"; // Redireciona se estiver correto
            } else {
                alert("Dados incorretos. Por favor, tente novamente.");
            }
        }
    </script>

</body>
</html>
